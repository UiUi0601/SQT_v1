<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQT 交易系統 - 安全登入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0B0E14 0%, #181C27 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #D8DEF0;
        }

        .login-container {
            background: rgba(24, 28, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(42, 46, 57, 0.5);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            color: #4D9FFF;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: #6B7394;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8B949E;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"] {
            width: 100%;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid rgba(42, 46, 57, 0.8);
            border-radius: 8px;
            color: #D8DEF0;
            padding: 12px 16px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #4D9FFF;
            background: rgba(13, 17, 23, 0.8);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #4D9FFF 0%, #26A69A 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(77, 159, 255, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #FF3B69;
            font-size: 12px;
            margin-top: 8px;
            min-height: 16px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(77, 159, 255, 0.3);
            border-radius: 50%;
            border-top-color: #4D9FFF;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .security-info {
            font-size: 11px;
            color: #6B7394;
            margin-top: 24px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">⚡ AQT</div>
        <div class="subtitle">動態網格交易系統</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="password">登入密碼</label>
                <input type="password" id="password" placeholder="輸入登入密碼..." required>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">安全登入</span>
            </button>
            
            <div class="error-message" id="errorMsg"></div>
        </form>
        
        <div class="security-info">
            🔒 您的密碼經過加密處理，絕不會以明文形式傳輸或儲存。
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!password.trim()) {
                errorMsg.textContent = '請輸入密碼';
                return;
            }
            
            loginBtn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span>驗證中...';
            errorMsg.textContent = '';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 登入成功，儲存token並跳轉到dashboard
                    localStorage.setItem('aqt_session', data.token);
                    window.location.href = '/dashboard.html';
                } else {
                    errorMsg.textContent = data.error || '登入失敗';
                    loginBtn.disabled = false;
                    btnText.textContent = '安全登入';
                }
            } catch (error) {
                errorMsg.textContent = '網路錯誤，請稍後再試';
                loginBtn.disabled = false;
                btnText.textContent = '安全登入';
            }
        });

        // 如果已經有session，直接跳轉
        if (localStorage.getItem('aqt_session')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
